name: Release

on:
  workflow_dispatch:
    inputs:
      increment:
        description: "Version increment (empty = auto-detect from commits)"
        required: false
        type: choice
        options:
          - ""
          - patch
          - minor
          - major

permissions:
  contents: write

jobs:
  release:
    name: Create release tag
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.PAT_TOKEN }}

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod

      - name: Build release-it-go
        run: go build -o ./bin/release-it-go ./cmd/release-it-go

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Create tag with release-it-go
        env:
          INCREMENT: ${{ inputs.increment }}
        run: |
          ARGS="--ci --no-github.release"
          if [ -n "$INCREMENT" ]; then
            ARGS="$ARGS -i $INCREMENT"
          fi
          ./bin/release-it-go $ARGS

      - name: Push tag
        run: |
          TAG=$(git describe --tags --abbrev=0)
          echo "Pushing tag: $TAG"
          git push origin HEAD
          git push origin "$TAG"
