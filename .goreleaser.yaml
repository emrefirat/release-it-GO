version: 2

project_name: release-it-go

before:
  hooks:
    - go mod tidy
    - go vet ./...
    - go test ./...

builds:
  - main: ./cmd/release-it-go
    binary: release-it-go
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - format: tar.gz
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        format: zip

checksum:
  name_template: "checksums.txt"

changelog:
  use: git
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"
      - "^test:"
      - "^ci:"

release:
  github:
    owner: emrefirat
    name: release-it-GO
  draft: false
  prerelease: auto
  name_template: "v{{.Version}}"

nfpms:
  - package_name: release-it-go
    homepage: "https://github.com/emrefirat/release-it-GO"
    maintainer: "emrefirat"
    description: "Release automation tool for Git projects"
    formats:
      - deb
      - rpm
      - apk
